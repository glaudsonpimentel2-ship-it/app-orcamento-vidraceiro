<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Vidros Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; background: #fafafa; }
        .pass-container { position: relative; width: 100%; }
        .toggle-btn { position: absolute; right: 12px; top: 12px; cursor: pointer; font-size: 22px; z-index: 10; }
        button { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; background-color: #1a73e8; color: white; }
        button:active { transform: scale(0.98); background-color: #1557b0; }
        #app-principal { display: none; }
        label { font-weight: bold; display: block; margin: 10px 0 5px; color: #444; text-align: left; }
        .btn-green { background-color: #25d366; color: white; margin-top: 15px; display: none; text-decoration: none; text-align: center; line-height: 50px; border-radius: 8px; font-weight: bold; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 8px; background: #e8f0fe; display: none; border-left: 5px solid #1a73e8; text-align: left; }
    </style>
</head>
<body>

    <div id="tela-login" class="card">
        <div style="font-size: 50px; margin-bottom: 10px;">💎</div>
        <h2>Perfil Vidros Pro</h2>
        <p style="color: #666;">Acesse sua conta</p>
        <input type="text" id="user" placeholder="Usuário">
        <div class="pass-container">
            <input type="password" id="pass" placeholder="Senha">
            <span class="toggle-btn" onclick="verSenha()">👁️</span>
        </div>
        <button onclick="logar()">ENTRAR</button>
    </div>

    <div id="app-principal" class="card" style="max-width: 500px;">
        <h2>Orçamento Perfil Vidros</h2>
        <label>Nome do Cliente:</label>
        <input type="text" id="cliente" placeholder="Ex: Sr. João">
        <label>WhatsApp do Cliente:</label>
        <input type="number" id="tel" placeholder="DDD + Número">
        <label>Tipo de Vidro:</label>
        <select id="vidro">
            <option value="132.80">Incolor 6mm (R$ 132,80)</option>
            <option value="165.92">Incolor 8mm (R$ 165,92)</option>
            <option value="166.90">Verde/Fumê 6mm (R$ 166,90)</option>
            <option value="205.14">Verde/Fumê 8mm (R$ 205,14)</option>
        </select>
        <div style="display: flex; gap: 10px;">
            <div style="flex:1;"><label>Largura (m):</label><input type="number" id="largura" step="0.01"></div>
            <div style="flex:1;"><label>Altura (m):</label><input type="number" id="altura" step="0.01"></div>
        </div>
        <button onclick="calcular()">CALCULAR PREÇO</button>
        <div id="resultado"></div>
        <a id="btnZap" class="btn-green" target="_blank">ENVIAR PARA WHATSAPP</a>
    </div>

    <script>
        function verSenha() {
            var p = document.getElementById("pass");
            var b = document.querySelector(".toggle-btn");
            if (p.type === "password") { p.type = "text"; b.innerHTML = "🙈"; }
            else { p.type = "password"; b.innerHTML = "👁️"; }
        }

        function logar() {
            // .toLowerCase() faz tudo ficar minúsculo antes de conferir
            var s = document.getElementById("pass").value.toLowerCase();
            if (s === "pimentel0318") {
                document.getElementById("tela-login").style.display = "none";
                document.getElementById("app-principal").style.display = "block";
            } else {
                alert("Senha incorreta! Use: pimentel0318");
            }
        }

        function calcular() {
            const precoVidro = parseFloat(document.getElementById('vidro').value);
            const l = parseFloat(document.getElementById('largura').value);
            const a = parseFloat(document.getElementById('altura').value);
            const cliente = document.getElementById('cliente').value || "Cliente";
            const tel = document.getElementById('tel').value;

            if (l > 0 && a > 0) {
                const total = (l * a * precoVidro) * 2;
                document.getElementById('resultado').style.display = 'block';
                document.getElementById('resultado').innerHTML = `<strong>Resumo:</strong><br>Área: ${(l*a).toFixed(2)}m²<br><strong>Total: R$ ${total.toFixed(2)}</strong>`;
                
                const zap = document.getElementById('btnZap');
                zap.style.display = 'block';
                const msg = `Orçamento Perfil Vidros\nCliente: ${cliente}\nMedidas: ${l}m x ${a}m\nValor: R$ ${total.toFixed(2)}`;
                zap.href = `https://wa.me/55${tel}?text=${encodeURIComponent(msg)}`;
            } else {
                alert("Preencha as medidas!");
            }
        }
    </script>
</body>
</html>
