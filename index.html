<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Vidros Pro</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .pass-container { position: relative; display: flex; align-items: center; }
        .toggle-btn { position: absolute; right: 15px; cursor: pointer; font-size: 22px; z-index: 10; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 18px; }
        #app-principal { display: none; }
    </style>
</head>
<body>

    <div id="tela-login" class="card">
        <h2>💎 Perfil Vidros Pro</h2>
        <input type="text" id="user" placeholder="Usuário">
        <div class="pass-container">
            <input type="password" id="pass" placeholder="Senha">
            <span class="toggle-btn" onclick="verSenha()">👁️</span>
        </div>
        <button onclick="logar()">ENTRAR</button>
    </div>

    <div id="app-principal" class="card">
        <h2>✅ Sistema Liberado!</h2>
        <p>Olá Pimentel, o app está pronto.</p>
        <button onclick="location.reload()" style="background:#666;">SAIR</button>
    </div>

    <script>
        function verSenha() {
            var campo = document.getElementById("pass");
            var btn = document.querySelector(".toggle-btn");
            if (campo.type === "password") {
                campo.type = "text";
                btn.innerHTML = "🙈";
            } else {
                campo.type = "password";
                btn.innerHTML = "👁️";
            }
        }

        function logar() {
            var s = document.getElementById("pass").value;
            // A SENHA É: Pimentel0318
            if (s === "Pimentel0318") {
                document.getElementById("tela-login").style.display = "none";
                document.getElementById("app-principal").style.display = "block";
            } else {
                alert("Senha incorreta! Verifique o maiúsculo.");
            }
        }
    </script>
</body>
</html>
